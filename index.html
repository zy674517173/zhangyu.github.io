    <body>
        <h1>大标题</h1>
        <!--插入列表项-->
        <ul type="square">  <!--type更改菜单前面方块-->
            <li>菜单一</li>
            <li>菜单二</li>
            <li>菜单三</li>
            <li>菜单四</li>
        </ul>
        
        <!--插入编号列表-->
        <ol type="1">  <!--type更改菜单编号格式-->
            <li>菜单一</li>
            <li>菜单二</li>
            <li>菜单三</li>
            <li>菜单四</li>
        </ol>
        
        <dl>
        <dt>字母</dt>
            <dd>aaa</dd>
            <dd>bbb</dd>
            <dd>ccc</dd>
            
        </dl>
        
        <h2>二级标题</h2>
        
        <a href="http://index.baidu.com" target="_blank">百度搜索指数页面</a><br />
        <a href="mailto:674517173@qq.com">给我发邮件</a>
        
        <p>
        换<br />
        行
        </p>
        
        <div>块元素，可以设置高和宽&nbsp;&nbsp;&nbsp;前面是空格</div>
        
        <span>文本标记</span><br />
        <font>文本标记2</font>
    
        <pre>保留 内部   格式</pre>
    
        
        <!--插入实体符号-->
        &#64;
        
        <!--插入水平线-->
        <hr />
    
        <!--插入日期-->
        <big>现在时间</big>：<small>2020年6月4日   13:51</small>
    
    </body><br />
    
    <body>
        <!--插入图片，  alt当文本不能正常显示的时候，替换文本-->

        <!--插入音频  宽高为0，自动播放-->
        <embed src="music/灰澈 - 午后.mp3" width="0" height="0">

</html>
